<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="Discord Alert Bridge admin console preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15171f"/>
      <stop offset="1" stop-color="#22283a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5865f2"/>
      <stop offset="1" stop-color="#29cc7a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f5f7fb; }
      .label { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b7becf; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #7f889c; }
      .mono { font: 500 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #cdd5e7; }
      .value { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
    </style>
  </defs>
  <rect width="1280" height="760" rx="34" fill="url(#bg)"/>
  <circle cx="1170" cy="95" r="220" fill="#5865f2" opacity="0.08"/>
  <circle cx="220" cy="690" r="260" fill="#29cc7a" opacity="0.07"/>

  <g filter="url(#shadow)">
    <rect x="64" y="54" width="1152" height="652" rx="24" fill="#101218"/>
    <rect x="64" y="54" width="232" height="652" rx="24" fill="#0b0d12"/>
    <rect x="296" y="54" width="920" height="652" rx="24" fill="#151821"/>
  </g>

  <g transform="translate(92 90)">
    <rect width="42" height="42" rx="12" fill="url(#accent)"/>
    <text x="58" y="18" class="title" font-size="18">Discord Alert</text>
    <text x="58" y="38" class="small">Bridge Console</text>

    <g transform="translate(0 92)">
      <rect width="176" height="44" rx="12" fill="#5865f2" opacity="0.18"/>
      <text x="18" y="28" class="label" fill="#ffffff">Overview</text>
    </g>
    <text x="18" y="178" class="label">Configuration</text>
    <text x="18" y="226" class="label">Messages</text>
    <text x="18" y="274" class="label">Logs</text>

    <g transform="translate(0 484)">
      <rect width="176" height="104" rx="18" fill="#151821"/>
      <text x="16" y="30" class="small">Bridge Status</text>
      <text x="16" y="62" class="value" fill="#29cc7a">Running</text>
      <rect x="16" y="76" width="144" height="12" rx="6" fill="#29cc7a" opacity="0.22"/>
      <circle cx="146" cy="82" r="10" fill="#29cc7a"/>
    </g>
  </g>

  <g transform="translate(336 92)">
    <text x="0" y="0" class="title">Monitoring Dashboard</text>
    <text x="0" y="28" class="small">Local-only admin console with redacted configuration values</text>

    <g transform="translate(0 70)">
      <rect width="252" height="132" rx="18" fill="#1d2230"/>
      <text x="24" y="36" class="small">Watched Channels</text>
      <text x="24" y="78" class="value">3</text>
      <text x="24" y="108" class="small">auto-filled from channel URLs</text>
    </g>
    <g transform="translate(280 70)">
      <rect width="252" height="132" rx="18" fill="#1d2230"/>
      <text x="24" y="36" class="small">Forwarders</text>
      <text x="24" y="78" class="value">Lark + Gmail</text>
      <text x="24" y="108" class="small">test notification ready</text>
    </g>
    <g transform="translate(560 70)">
      <rect width="252" height="132" rx="18" fill="#1d2230"/>
      <text x="24" y="36" class="small">Latest Session</text>
      <text x="24" y="78" class="value">12 min</text>
      <text x="24" y="108" class="small">current log only</text>
    </g>

    <g transform="translate(0 242)">
      <rect width="812" height="240" rx="20" fill="#1d2230"/>
      <text x="24" y="38" class="label">Configuration</text>
      <rect x="24" y="62" width="764" height="44" rx="12" fill="#101218"/>
      <text x="42" y="90" class="mono">DISCORD_CHANNEL_URLS=https://discord.com/channels/123.../456...</text>
      <rect x="24" y="122" width="370" height="44" rx="12" fill="#101218"/>
      <text x="42" y="150" class="mono">DISCORD_USER_TOKEN=••••••••••••</text>
      <rect x="418" y="122" width="370" height="44" rx="12" fill="#101218"/>
      <text x="436" y="150" class="mono">LARK_WEBHOOK_URL=https://.../hook</text>
      <rect x="24" y="184" width="156" height="36" rx="10" fill="#5865f2"/>
      <text x="50" y="207" class="label" fill="#ffffff">Save Config</text>
      <rect x="196" y="184" width="146" height="36" rx="10" fill="#29cc7a"/>
      <text x="228" y="207" class="label" fill="#06150d">Start</text>
      <rect x="358" y="184" width="180" height="36" rx="10" fill="#2b3142"/>
      <text x="386" y="207" class="label">Test Notification</text>
    </g>

    <g transform="translate(0 510)">
      <rect width="812" height="90" rx="18" fill="#101218"/>
      <text x="24" y="34" class="mono">===== Bridge session started 2026-07-06 10:00:00 UTC =====</text>
      <text x="24" y="62" class="mono">INFO Forwarded Discord message 1523509023725584465</text>
    </g>
  </g>
</svg>
